<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Birthday VN 🎂</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
}

/* BACKGROUND FIX (CLEAN) */
body{
  font-family: Arial;
  color:white;
  text-align:center;

  background:url("https://i.postimg.cc/q7CgMBCt/352663d21aaaf814f86c46e8ecade9b5.jpg")
  center/cover no-repeat;

  overflow:hidden;
}

/* DARK LAYER */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:1;
}

/* SCREEN SYSTEM (ONLY ONE RULE) */
.screen{
  position:fixed;
  inset:0;
  z-index:2;

  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  padding:20px;
}

.screen.active{
  display:flex;
}

/* INPUT */
input{
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
  outline:none;
}

/* BUTTON */
button{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  font-size:18px;
  margin:10px;
  cursor:pointer;
}

/* NO BUTTON */
#noBtn{position:relative;}

/* GIRL */
.girl{
  width:230px;
  border-radius:20px;
  box-shadow:0 0 25px pink;
}

/* WISH BOX */
#wishBox{
  width:90%;
  max-width:650px;
  height:260px;
  overflow-y:auto;
  background:rgba(255,255,255,0.12);
  padding:15px;
  border-radius:15px;
  text-align:left;
  line-height:1.6;
}

/* CAKE */
.cake{
  font-size:110px;
  cursor:pointer;
}

/* GLOW */
.glow{
  text-shadow:0 0 10px #fff,0 0 20px #ff66ff;
}

</style>
</head>

<body>

<div class="overlay"></div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5d1b6f4.mp3">
</audio>

<!-- 1 NAME -->
<div id="s1" class="screen active">
  <h1 class="glow">🐦🎈 Enter Your Name</h1>
  <input id="name" placeholder="Type your name...">
  <button onclick="go(2)">Continue ➡</button>
</div>

<!-- 2 INTRO -->
<div id="s2" class="screen">
  <h2 class="glow">Are you ready for surprise? 🎉</h2>
  <button onclick="start()">YES 💖</button>
  <button id="noBtn">NO 😏</button>
</div>

<!-- 3 GIRL -->
<div id="s3" class="screen">
  <h2 class="glow">🌸 Anime Girl Appears 🌸</h2>

  <img class="girl"
  src="https://i.postimg.cc/YqnS6L6m/1aedee308e4e6dd6883aea7a902f9ae1.jpg">

  <div id="wishBox"></div>

  <button onclick="go(4)">Next 🎂</button>
</div>

<!-- 4 CAKE -->
<div id="s4" class="screen">
  <h2 class="glow">🎂 Cake Cutting</h2>
  <div class="cake" onclick="cutCake()">🎂</div>
</div>

<!-- 5 FINAL -->
<div id="s5" class="screen">
  <h1 class="glow">🎉 Important Message 🎉</h1>
  <p id="final"></p>
</div>

<script>

/* SINGLE NAV SYSTEM */
function go(n){
  document.querySelectorAll(".screen")
  .forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}

/* NO BUTTON MOVE */
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
  noBtn.style.position="absolute";
  noBtn.style.top=Math.random()*80+"vh";
  noBtn.style.left=Math.random()*80+"vw";
});

/* START */
function start(){
  document.getElementById("music").play();
  go(3);
  typeWishes();
}

/* TYPEWRITER */
function typeWishes(){

  let name=document.getElementById("name").value || "Friend";

  let texts=[
`✨ Hey ${name}, i hope you will feel fine 💖`,
`🌸 You are truly special like a main character`,
`🎂 May your life always level up like a game`,
`💫 Stay strong, stay happy, keep shining always`,
`🎉 You are more amazing than you think!`
  ];

  let box=document.getElementById("wishBox");
  let i=0;

  function next(){
    if(i<texts.length){
      let p=document.createElement("p");
      box.appendChild(p);

      let j=0;
      let t=setInterval(()=>{
        p.innerHTML += texts[i].charAt(j);
        j++;

        box.scrollTop = box.scrollHeight;

        if(j>=texts[i].length){
          clearInterval(t);
          i++;
          setTimeout(next,500);
        }
      },20);
    }
  }

  next();
}

/* CAKE */
function goCake(){
  go(4);
}

function cutCake(){
  go(5);

  let name=document.getElementById("name").value || "Friend";

  let msg=`🎊 Cake cut done ${name}!  
Now go give party to your friends 😏  
otherwise you are gay xD 😂`;

  let el=document.getElementById("final");

  let k=0;
  function type(){
    if(k<msg.length){
      el.innerHTML += msg.charAt(k);
      k++;
      setTimeout(type,25);
    }
  }
  type();
}

/* FIX BUTTON NAME */
document.querySelector("#s3 button").onclick = goCake;

</script>

</body>
</html>
